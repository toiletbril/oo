name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [ master, staging ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            clang make libcap-dev libcap2-bin iptables nftables mold

      - name: Build
        run: make MODE=asan

      - name: Create non-root test user
        run: |
          sudo useradd --system --create-home --shell /bin/bash oouser
          sudo chown -R oouser:oouser .

      - name: Run oo init
        run: sudo ./oo init

      - name: Run tests
        run: sudo -u oouser make test

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test/trace.log
            test/failed.diff
          if-no-files-found: ignore

      - name: Summary on failure
        if: failure()
        shell: sh
        run: |
          {
            if test -s test/failed.diff; then
              echo '### failed.diff'
              echo '```diff'
              cat test/failed.diff
              echo '```'
            fi
            if test -s test/trace.log; then
              echo '### trace.log'
              echo '```log'
              cat test/trace.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
